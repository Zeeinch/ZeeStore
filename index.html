<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ZeeStore — Login atau daftar untuk mulai belanja online terlengkap dan termurah.">
  <title>ZeeStore — Login & Daftar</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-in-up">
      <!-- Brand -->
      <div class="brand-logo">
        <h1><i class="bi bi-bag-heart-fill"></i> ZeeStore</h1>
        <p>Belanja online mudah & terpercaya</p>
      </div>

      <!-- Tabs -->
      <ul class="nav nav-tabs" id="authTabs" role="tablist">
        <li class="nav-item flex-fill text-center" role="presentation">
          <button class="nav-link active w-100" id="login-tab" data-bs-toggle="tab" data-bs-target="#loginForm" type="button" role="tab">Masuk</button>
        </li>
        <li class="nav-item flex-fill text-center" role="presentation">
          <button class="nav-link w-100" id="register-tab" data-bs-toggle="tab" data-bs-target="#registerForm" type="button" role="tab">Daftar</button>
        </li>
      </ul>

      <!-- Tab Content -->
      <div class="tab-content" id="authTabContent">
        <!-- LOGIN -->
        <div class="tab-pane fade show active" id="loginForm" role="tabpanel">
          <form id="formLogin" novalidate>
            <div class="mb-3">
              <label for="loginEmail" class="form-label">Email</label>
              <input type="email" class="form-control" id="loginEmail" placeholder="nama@email.com" required>
            </div>
            <div class="mb-3">
              <label for="loginPassword" class="form-label">Password</label>
              <div class="position-relative">
                <input type="password" class="form-control" id="loginPassword" placeholder="Masukkan password" required>
                <button type="button" class="btn btn-sm position-absolute end-0 top-50 translate-middle-y me-2" 
                  onclick="togglePassword('loginPassword', this)" style="background:none;border:none;color:rgba(255,255,255,0.5);">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>
            <div id="loginError" class="alert alert-danger py-2 d-none" style="font-size:0.85rem;"></div>
            <button type="submit" class="btn btn-primary w-100 mb-3" id="btnLogin">
              <span class="spinner-border spinner-border-sm d-none me-2" id="loginSpinner"></span>
              Masuk
            </button>
          </form>

          <div class="divider">atau masuk dengan</div>

          <button class="btn btn-google w-100" id="btnGoogle" onclick="googleLogin()">
            <i class="bi bi-google me-2"></i>Google
          </button>
        </div>

        <!-- REGISTER -->
        <div class="tab-pane fade" id="registerForm" role="tabpanel">
          <form id="formRegister" novalidate>
            <div class="mb-3">
              <label for="regName" class="form-label">Nama Lengkap</label>
              <input type="text" class="form-control" id="regName" placeholder="Nama lengkap kamu" required>
            </div>
            <div class="mb-3">
              <label for="regEmail" class="form-label">Email</label>
              <input type="email" class="form-control" id="regEmail" placeholder="nama@email.com" required>
            </div>
            <div class="mb-3">
              <label for="regPassword" class="form-label">Password</label>
              <div class="position-relative">
                <input type="password" class="form-control" id="regPassword" placeholder="Min. 6 karakter" required minlength="6">
                <button type="button" class="btn btn-sm position-absolute end-0 top-50 translate-middle-y me-2" 
                  onclick="togglePassword('regPassword', this)" style="background:none;border:none;color:rgba(255,255,255,0.5);">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>
            <div class="mb-3">
              <label for="regPasswordConfirm" class="form-label">Konfirmasi Password</label>
              <input type="password" class="form-control" id="regPasswordConfirm" placeholder="Ulangi password" required>
            </div>
            <div id="regError" class="alert alert-danger py-2 d-none" style="font-size:0.85rem;"></div>
            <div id="regSuccess" class="alert alert-success py-2 d-none" style="font-size:0.85rem;"></div>
            <button type="submit" class="btn btn-primary w-100" id="btnRegister">
              <span class="spinner-border spinner-border-sm d-none me-2" id="regSpinner"></span>
              Daftar
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container-zee"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- App Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // If already logged in, redirect to home
    (async () => {
      const session = await getSession();
      if (session) window.location.href = 'home.html';
    })();

    // Toggle password visibility
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    // Login form
    document.getElementById('formLogin').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      const spinner = document.getElementById('loginSpinner');
      const btn = document.getElementById('btnLogin');

      errorEl.classList.add('d-none');
      spinner.classList.remove('d-none');
      btn.disabled = true;

      try {
        await signIn(email, password);
        window.location.href = 'home.html';
      } catch (err) {
        errorEl.textContent = err.message === 'Invalid login credentials'
          ? 'Email atau password salah. Silakan coba lagi.'
          : err.message;
        errorEl.classList.remove('d-none');
      } finally {
        spinner.classList.add('d-none');
        btn.disabled = false;
      }
    });

    // Register form
    document.getElementById('formRegister').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regPasswordConfirm').value;
      const errorEl = document.getElementById('regError');
      const successEl = document.getElementById('regSuccess');
      const spinner = document.getElementById('regSpinner');
      const btn = document.getElementById('btnRegister');

      errorEl.classList.add('d-none');
      successEl.classList.add('d-none');

      // Validation
      if (password !== confirm) {
        errorEl.textContent = 'Password dan konfirmasi tidak cocok.';
        errorEl.classList.remove('d-none');
        return;
      }

      if (password.length < 6) {
        errorEl.textContent = 'Password minimal 6 karakter.';
        errorEl.classList.remove('d-none');
        return;
      }

      spinner.classList.remove('d-none');
      btn.disabled = true;

      try {
        await signUp(email, password, name);
        successEl.textContent = 'Pendaftaran berhasil! Cek email kamu untuk verifikasi, atau langsung masuk.';
        successEl.classList.remove('d-none');
        // Try auto-login
        try {
          await signIn(email, password);
          window.location.href = 'home.html';
        } catch (e) {
          // Need email confirmation
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('d-none');
      } finally {
        spinner.classList.add('d-none');
        btn.disabled = false;
      }
    });

    // Google login (placeholder)
    function googleLogin() {
      _supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/home.html' }
      });
    }
  </script>
</body>
</html>
